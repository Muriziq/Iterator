<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hybrid Rectangle Edges</title>
<style>
  canvas {
    border: 1px solid #ccc;
    cursor: crosshair;
  }
  #info {
    margin-top: 10px;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>

<canvas id="canvas" width="600" height="400"></canvas>
<div id="info">Double-click near an edge to toggle between line/curve for that edge.</div>

<script>
class ShapeToolRect {
  constructor(x, y, width, height) {
    // Corners
    this.points = [
      { x: x, y: y },                     // P0: top-left
      { x: x + width, y: y },             // P1: top-right
      { x: x + width, y: y + height },    // P2: bottom-right
      { x: x, y: y + height }             // P3: bottom-left
    ];

    // Control points for curves, 2 per edge (4 edges)
    this.controls = [
      [ {x: x + width * 0.25, y: y}, {x: x + width * 0.75, y: y} ],              // top edge
      [ {x: x + width, y: y + height * 0.25}, {x: x + width, y: y + height * 0.75} ], // right edge
      [ {x: x + width * 0.75, y: y + height}, {x: x + width * 0.25, y: y + height} ], // bottom edge
      [ {x: x, y: y + height * 0.75}, {x: x, y: y + height * 0.25} ]             // left edge
    ];

    // Edge modes: false = line, true = curve
    this.edgeModes = [false, false, false, false];

    this.selectedPointIndex = null;  // dragging corner point
    this.selectedControl = null;     // dragging control point
  }

  draw(ctx) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.beginPath();
    ctx.moveTo(this.points[0].x, this.points[0].y);

    for(let i = 0; i < 4; i++) {
      const next = (i + 1) % 4;
      if (this.edgeModes[i]) {
        // curved edge
        const cp1 = this.controls[i][0];
        const cp2 = this.controls[i][1];
        const pNext = this.points[next];
        ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, pNext.x, pNext.y);
      } else {
        // straight line edge
        ctx.lineTo(this.points[next].x, this.points[next].y);
      }
    }

    ctx.closePath();

    ctx.fillStyle = "#ffcccc";
    ctx.fill();

    ctx.strokeStyle = "#cc0000";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw corners (blue)
    this.points.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = (i === this.selectedPointIndex) ? "#0000ff" : "#0000ff88";
      ctx.fill();
      ctx.strokeStyle = "#000";
      ctx.stroke();
    });

    // Draw control points (green) only for edges in curve mode
    this.edgeModes.forEach((isCurve, i) => {
      if (isCurve) {
        this.controls[i].forEach((cp, j) => {
          ctx.beginPath();
          ctx.arc(cp.x, cp.y, 5, 0, Math.PI * 2);
          const isSelected = this.selectedControl &&
                             this.selectedControl.curveIndex === i &&
                             this.selectedControl.controlIndex === j;
          ctx.fillStyle = isSelected ? "#00cc00" : "#00cc0088";
          ctx.fill();
          ctx.strokeStyle = "#000";
          ctx.stroke();
        });
      }
    });
  }

  hitTest(mouseX, mouseY) {
    // Hit test corners first
    for(let i = 0; i < this.points.length; i++) {
      const p = this.points[i];
      const dx = mouseX - p.x;
      const dy = mouseY - p.y;
      if(dx*dx + dy*dy < 10*10) {
        this.selectedPointIndex = i;
        this.selectedControl = null;
        return true;
      }
    }

    // Hit test control points only for curved edges
    for(let i = 0; i < this.edgeModes.length; i++) {
      if (this.edgeModes[i]) {
        for(let j = 0; j < 2; j++) {
          const cp = this.controls[i][j];
          const dx = mouseX - cp.x;
          const dy = mouseY - cp.y;
          if(dx*dx + dy*dy < 10*10) {
            this.selectedControl = { curveIndex: i, controlIndex: j };
            this.selectedPointIndex = null;
            return true;
          }
        }
      }
    }

    // Nothing hit
    this.selectedPointIndex = null;
    this.selectedControl = null;
    return false;
  }

  moveSelected(x, y) {
    if (this.selectedPointIndex !== null) {
      this.points[this.selectedPointIndex].x = x;
      this.points[this.selectedPointIndex].y = y;

      // Optionally: update controls to stay relative to corners?
      // (Could be implemented here)
    }
    if (this.selectedControl !== null) {
      const { curveIndex, controlIndex } = this.selectedControl;
      this.controls[curveIndex][controlIndex].x = x;
      this.controls[curveIndex][controlIndex].y = y;
    }
  }

  // Detect which edge is clicked near (for toggling edge mode)
  getEdgeAtPosition(x, y) {
    const threshold = 10; // pixels
    for(let i = 0; i < 4; i++) {
      const p1 = this.points[i];
      const p2 = this.points[(i+1) % 4];

      // Distance from point (x,y) to line segment p1-p2:
      const dist = pointLineDistance(x, y, p1.x, p1.y, p2.x, p2.y);
      if (dist <= threshold) return i;
    }
    return null;
  }

  toggleEdgeMode(edgeIndex) {
    if (edgeIndex === null) return;
    this.edgeModes[edgeIndex] = !this.edgeModes[edgeIndex];
  }
}

// Utility: distance from point to line segment
function pointLineDistance(px, py, x1, y1, x2, y2) {
  const A = px - x1;
  const B = py - y1;
  const C = x2 - x1;
  const D = y2 - y1;

  const dot = A * C + B * D;
  const len_sq = C * C + D * D;
  let param = -1;
  if (len_sq !== 0) param = dot / len_sq;

  let xx, yy;

  if (param < 0) {
    xx = x1;
    yy = y1;
  } else if (param > 1) {
    xx = x2;
    yy = y2;
  } else {
    xx = x1 + param * C;
    yy = y1 + param * D;
  }

  const dx = px - xx;
  const dy = py - yy;
  return Math.sqrt(dx * dx + dy * dy);
}

// Setup canvas and shape
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let shapeRect = new ShapeToolRect(100, 100, 200, 150);
let dragging = false;

function getMousePos(evt) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: evt.clientX - rect.left,
    y: evt.clientY - rect.top
  };
}

canvas.addEventListener("mousedown", (e) => {
  const pos = getMousePos(e);
  if(shapeRect.hitTest(pos.x, pos.y)) {
    dragging = true;
    draw();
  }
});

canvas.addEventListener("mousemove", (e) => {
  if(!dragging) return;
  const pos = getMousePos(e);
  shapeRect.moveSelected(pos.x, pos.y);
  draw();
});

canvas.addEventListener("mouseup", () => {
  dragging = false;
  shapeRect.selectedPointIndex = null;
  shapeRect.selectedControl = null;
  draw();
});

canvas.addEventListener("mouseleave", () => {
  dragging = false;
  shapeRect.selectedPointIndex = null;
  shapeRect.selectedControl = null;
  draw();
});

// Toggle edge mode on double click near edge
canvas.addEventListener("dblclick", (e) => {
  const pos = getMousePos(e);
  const edgeIndex = shapeRect.getEdgeAtPosition(pos.x, pos.y);
  if(edgeIndex !== null) {
    shapeRect.toggleEdgeMode(edgeIndex);
    draw();
  }
});

function draw() {
  shapeRect.draw(ctx);
}

draw();
</script>

</body>
</html>
