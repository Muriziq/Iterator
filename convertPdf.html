<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shape Tool Rectangle Demo</title>
<style>
  canvas {
    border: 1px solid #ccc;
    cursor: crosshair;
  }
</style>
</head>
<body>

<canvas id="canvas" width="600" height="400"></canvas>
<script>
  const canvas = document.getElementById("canvas")
  const ctx = canvas.getContext("2d")
  
ctx.beginPath();
ctx.moveTo(50, 50); // Start point
ctx.quadraticCurveTo(50, 200, 150, 50); // Control point (100,0), end point (150,50)
ctx.stroke();
ctx.beginPath();
ctx.moveTo(50, 150); // Start point
ctx.bezierCurveTo(70, 100, 30, 100, 150, 150); // Two control points and end point
ctx.stroke();
</script>

</body>
</html>
