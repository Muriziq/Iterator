
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
  <body>
    <div class="main-div">
    <header class="header">
      <section>
           <div class="first-header">
            Size: <div>
              <div>
                Width:
<input type="text" id="width" />
              </div>
              <div>
                Height:
<input
              type="text"
              id="height"
            />
              </div>

            </div>
          </div>
          <div class="second-header">
            <button onclick="changeOrientation('potrait')"></button>
            <button onclick="changeOrientation('landscape')"></button>
          </div>
          <div class="third-header">
            <select name="measurement" id="measurement">
              <option value="px" selected>Pixels</option>
              <option value="pt">Points</option>
              <option value="in">Inches</option>
              <option value="m">Meters</option>
              <option value="cm">Centimeters</option>
              <option value="mm">Millimeters</option>
            </select>
            <select name="paperSize" id="paperSize">
              <option value="a1">A1</option>
              <option value="a2">A2</option>
              <option value="a3">A3</option>
              <option value="a4">A4</option>
              <option value="a5">A5</option>
              <option value="a6">A6</option>
              <option value="business-card">Business Card</option>
              <option value="letter" selected>Letter</option>
            </select>
          </div>
      </section>
      <div style="display:flex;flex-direction: row;align-items: center;gap: 1rem;">
                <button class="generateButton">
          Generate Button
        </button>
                <button class="save" onclick="saveToFile()">Save</button>
        <input type="file" name="" id="retrieve-file" accept=".json">
      </div>
    </header>
    <main>

      <aside class="leftSidebar">
        <button id="moveTool" title="move tool" onclick="Tools('moveTool')"><img src="images/Vector 160.svg" alt=""></button>
        <button id="multipleSelection" title="multiple select" onclick="Tools('multipleSelection')"><img src="images/Group 52.svg" alt=""></button>
                    <button title="Pan Tool" id="panTool" onclick="Tools('panTool')"><img src="images/Vector (4).svg" alt=""></button>
        <button id="addRectangle" title="add rectangle" onclick="Tools('addRectangle')"><img src="images/Rectangle 86.svg" alt=""></button>
        <button id="addEllipse" title="add ellipse" onclick="Tools('addEllipse')"><img src="images/Ellipse 11.svg" alt=""></button>
        <button id="addLine" title="add line" onclick="Tools('addLine')"><img src="images/Group 8.svg" alt=""></button>
        <button id="addPolygon" title="add polygon" onclick="Tools('addPolygon')"><img  src="images/Polygon 1.svg" alt=""></button>
        <button class="add-image" title="add image" onclick="Tools('add-image')"><input type="file" ><img src="images/Group 35.svg" alt=""></button>
        <button id="addTextbox" title="addtext box" onclick="Tools('addTextbox')"><img src="images/Vector 155.svg" alt=""></button>
        <hr>
        <button id="zoom" title="zoom" onclick="Tools('zoom')"><img src="images/Vector (3).svg" alt=""></button>
        <button id="duplicate" title="duplicate" onclick="Tools('duplicate')"><img src="images/Group 44.svg" alt=""></button>
        <button id="delete" title="delete" onclick="Tools('delete')"><img src="images/Group 45.svg" alt=""></button>
        <button id="pageTo" title="page to" onclick="Tools('pageTo')"><img src="images/Group 51.svg" alt=""></button>

      </aside>
      <section>
        <div class="generate">
          <div>
            <h3>RENDER</h3>
            <button onclick="cancelGenerate()"><img src="images/Vector (2).svg" alt=""></button>
          </div>
          <div class="generate1">
        <select name="renderPage" id="renderPage">
          <option value="auto">Per Page</option>
          <option value="custom">Custom</option>
          <option value="a0">A0</option>
          <option value="a1">A1</option>
          <option value="a2">A2</option>
          <option value="a3">A3</option>
          <option value="a4">A4</option>
          <option value="a5">A5</option>
          <option value="legal">Legal</option>
          <option value="letter">Letter</option>
        </select>

        <div>
            <div>Width<input type="number" name="renderWidth" id="renderWidth"></div>
            <div>Height<input type="number" name="renderHeight" id="renderHeight"></div>
          
        </div>
                <div class="perRow">
          No Per:
          <div>Row<input type="number" name="noPerRow" id="noPerRow"></div>
          <div>Col<input type="number" name="noPerColumn" id="noPerColumn"></div>
          
        </div>
        <div>
          <div>
          Spacing: <input type="text" name="spacing" id="spacing">
          </div>

        </div>
          </div>
          <button onclick="generateCard()">Done</button>
        </div>
        <div class="notification"></div>
        <section class="upsec">
          <div>
            <button onclick="undo()" title="undo"><img src="images/Vector.svg" alt=""></button>
            <button onclick="redo()" title="redo"><img src="images/Vector.svg" style="transform: scaleX(-1);" alt=""></button>
          </div>
          <div style="position: relative;">
            <button title="clip" class="snip"><img src="images/clip.png" alt=""></button>
            <button onclick="group()" title="group"><img src="images/group.png" alt=""></button>
            <button class="editclip" title="edit clip">Edit Clip</button></div>
        </section>
        <div class="canva" style="height: 100%;min-height: 0;width: 100%;overflow: hidden;">
        <div class="canvas">
          <div style="opacity: 0;"></div>
          <canvas id="canvas"></canvas>
        </div>
        </div>


      </section>
      <aside id="propertiesTab">
        <div>
          <div>
        <h3>Properties</h3>
        <button style="display: none;"></button>
          </div>
<section class="properties-align">
  <div>
    <button onclick="align('left')"><img src="images/Group 1.svg" alt=""></button>
    <button onclick="align('centerX')"><img src="images/Group 2.svg" alt=""></button>
    <button onclick="align('right')"><img src="images/Group 3.svg" alt=""></button>
  </div>
  <div>
    <button onclick="align('top')"><img src="images/Group 4.svg" alt=""></button>
    <button onclick="align('centerY')"><img src="images/Group 5.svg" alt=""></button>
    <button onclick="align('bottom')"><img src="images/Group 6.svg" alt=""></button>
  </div>
</section>
<section class="flip" style="gap: 0.5rem;">
  <button onclick="flip('x')"><img src="images/flipx.png" alt=""></button>
  <button onclick="flip('y')"><img src="images/flipy.png" alt=""></button>
</section>
        </div>

        <section id="properties">
          <p style='color: var(--h3-fill);'>No object selected</p>
        </section>
      </aside>
    </main>
    </div>

    <footer style="display: none;">
            <div class="buttonSide">

        <button class="saveAsPdf">Save As Pdf</button>
        <button class="saveAsImage">Save As Image</button>



      </div>
      <article id="generationArea"></article>

    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image@2.6.0/src/dom-to-image.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
