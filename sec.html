<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Name Tag Generator</title>
  <style>
    #container {
      position: relative;
      width: 600px;
      height: 400px;
      border: 2px solid #ccc;
      margin-bottom: 10px;
      background: #eee;
      overflow: hidden;
    }

    #imagePreview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    .textbox {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.8);
      padding: 5px 10px;
      border: 1px solid #333;
      cursor: move;
    }

    .generated {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .card {
      position: relative;
      width: 200px;
      height: 150px;
      border: 1px solid #aaa;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    .card p {
      position: absolute;
      margin: 0;
      background: rgba(255, 255, 255, 0.7);
      padding: 3px 5px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 100px;
    }

    #textboxProperties {
      width: 100%;
      margin-top: 10px;
    }

  </style>
</head>
<body>

  <input type="file" id="upload" accept="image/*"><br><br>

  <div id="container">
    <img id="imagePreview" src="" alt="">
  </div>

  <button onclick="addTextBox()">Add Textbox</button>
  <input type="text" id="textboxProperties" placeholder="Edit text" disabled><br><br>

  <textarea id="nameList" placeholder="Enter names, one per line..."></textarea><br><br>
  <button onclick="generateCards()">Generate Cards</button>

  <div class="generated" id="outputArea"></div>

  <script>
    const container = document.getElementById("container");
    const upload = document.getElementById("upload");
    const imagePreview = document.getElementById("imagePreview");
    const textboxProperties = document.getElementById("textboxProperties");
    const outputArea = document.getElementById("outputArea");
    const nameList = document.getElementById("nameList");

    let uploadedImageData = null;
    let selectedTextbox = null;
    let currentDragTextbox = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    upload.addEventListener('change', function () {
      const file = upload.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          uploadedImageData = e.target.result;
          imagePreview.src = uploadedImageData;
        };
        reader.readAsDataURL(file);
      }
    });

    function addTextBox() {
      const div = document.createElement('div');
      div.className = 'textbox';
      div.textContent = 'Name';
      div.style.left = '100px';
      div.style.top = '100px';

      container.appendChild(div);

      div.addEventListener('mousedown', startDrag);
      div.addEventListener('click', () => selectTextbox(div));
    }

    function selectTextbox(el) {
      selectedTextbox = el;
      textboxProperties.disabled = false;
      textboxProperties.value = el.textContent;
    }

    textboxProperties.addEventListener('input', () => {
      if (selectedTextbox) {
        selectedTextbox.textContent = textboxProperties.value;
      }
    });

    function startDrag(e) {
      if (!e.target.classList.contains('textbox')) return;

      currentDragTextbox = e.target;
      const rect = currentDragTextbox.getBoundingClientRect();
      dragOffsetX = e.clientX - rect.left;
      dragOffsetY = e.clientY - rect.top;

      document.addEventListener('mousemove', drag);
      document.addEventListener('mouseup', stopDrag);
    }

    function drag(e) {
      if (!currentDragTextbox) return;

      const containerRect = container.getBoundingClientRect();
      const newX = e.clientX - containerRect.left - dragOffsetX;
      const newY = e.clientY - containerRect.top - dragOffsetY;

      currentDragTextbox.style.left = `${newX}px`;
      currentDragTextbox.style.top = `${newY}px`;
    }

    function stopDrag() {
      currentDragTextbox = null;
      document.removeEventListener('mousemove', drag);
      document.removeEventListener('mouseup', stopDrag);
    }
    function generateCards() {
      if (!uploadedImageData || !selectedTextbox) {
        alert("Please upload an image and place a textbox.");
        return;
      }

      const names = nameList.value.split('\n').map(name => name.trim()).filter(name => name !== '');
      const textboxX = selectedTextbox.offsetLeft;
      const textboxY = selectedTextbox.offsetTop;

      outputArea.innerHTML = ''; // Clear previous cards

      for (const name of names) {
        const card = document.createElement('div');
        card.className = 'card';

        const img = document.createElement('img');
        img.src = uploadedImageData;

        const label = document.createElement('p');
        label.textContent = name;
        label.style.left = textboxX / container.offsetWidth * 100 + '%';
        label.style.top = textboxY / container.offsetHeight * 100 + '%';

        card.appendChild(img);
        card.appendChild(label);
        outputArea.appendChild(card);
      }
    }
  </script>

</body>
</html>
