<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rounded Polygon with Canvas</title>
  <style>
    body {
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Define the points of the irregular shape
    const points = [
      { x: 100, y: 100 },
      { x: 250, y: 80 },
      { x: 350, y: 200 },
      { x: 280, y: 300 },
      { x: 150, y: 250 },
    ];

    const cornerRadius = 25; // adjust for more/less rounding

    function drawRoundedShape(ctx, points, radius, closed = true) {
      if (points.length < 2) return;

      ctx.beginPath();

      for (let i = 0; i < points.length; i++) {
        const prev = points[(i - 1 + points.length) % points.length];
        const curr = points[i];
        const next = points[(i + 1) % points.length];

        const v1 = { x: curr.x - prev.x, y: curr.y - prev.y };
        const len1 = Math.hypot(v1.x, v1.y);
        v1.x /= len1;
        v1.y /= len1;
        const v2 = { x: next.x - curr.x, y: next.y - curr.y };
        const len2 = Math.hypot(v2.x, v2.y);
        v2.x /= len2;
        v2.y /= len2;
        const p1 = {
          x: curr.x - v1.x * Math.min(radius, len1 / 2),
          y: curr.y - v1.y * Math.min(radius, len1 / 2),
        };
        const p2 = {
          x: curr.x + v2.x * Math.min(radius, len2 / 2),
          y: curr.y + v2.y * Math.min(radius, len2 / 2),
        };

        if (i === 0) {
          ctx.moveTo(p1.x, p1.y);
        } else {
          ctx.lineTo(p1.x, p1.y);
        }

        ctx.arcTo(curr.x, curr.y, p2.x, p2.y, radius);
      }

      if (closed) {
        ctx.closePath();
      }

      // Style and draw the shape
      ctx.fillStyle = '#4A90E2';
      ctx.strokeStyle = '#2C3E50';
      ctx.lineWidth = 3;
      ctx.fill();
      ctx.stroke();
    }

    drawRoundedShape(ctx, points, cornerRadius);
  </script>
</body>
</html>
