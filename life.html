<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clip to Polygon Demo</title>
<style>
  body, html {
    margin: 0; padding: 0; overflow: hidden;
    display: flex; justify-content: center; align-items: center;
    height: 100vh;
    background: #eee;
  }
  canvas {
    background: #ccc;
    border: 1px solid #333;
  }
</style>
</head>
<body>
<canvas id="c" width="600" height="400"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// The points you gave
const points = [
  {
    points: { x: -75, y: -50 },
    edgeModes: false,
    controls: [
      { x: -37.5, y: -50 },
      { x: 37.5, y: -50 },
    ],
  },
  {
    points: { x: 75, y: -50 },
    edgeModes: false,
    controls: [
      { x: 75, y: -25 },
      { x: 75, y: 25 },
    ],
  },
  {
    points: { x: 163.70715896648534, y: 145.00579172307778 },
    edgeModes: false,
    controls: [
      { x: 130.41871367888595, y: 145.91608522540693 },
      { x: 55.41871367888595, y: 145.91608522540693 },
    ],
  },
  {
    points: { x: -75, y: 50 },
    edgeModes: false,
    controls: [
      { x: -75, y: 25 },
      { x: -75, y: -25 },
    ],
  },
];

// Center to translate canvas drawing (so polygon is centered)
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

// Load an image to clip inside polygon (optional)
const img = new Image();
img.src = "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80";
img.crossOrigin = "anonymous";

img.onload = () => {
  draw();
};

img.onerror = () => {
  draw(); // fallback if image fails
};

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(centerX, centerY);

  // Build the polygon path from points
  ctx.beginPath();
  ctx.moveTo(points[0].points.x, points[0].points.y);
  for (let i = 0; i < points.length; i++) {
    const next = (i + 1) % points.length;
    if (points[i].edgeModes) {
      const cp1 = points[i].controls[0];
      const cp2 = points[i].controls[1];
      const pNext = points[next].points;
      ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, pNext.x, pNext.y);
    } else {
      ctx.lineTo(points[next].points.x, points[next].points.y);
    }
  }
  ctx.closePath();

  // Clip to polygon
  ctx.clip();

  // Draw clipped image or fallback rect inside polygon
  if (img.complete && img.naturalWidth !== 0) {
    // Draw image centered, scale to roughly cover polygon bounds
    const scale = 1.2;
    const imgX = -img.width / 2 * scale;
    const imgY = -img.height / 2 * scale;
    ctx.drawImage(img, imgX, imgY, img.width * scale, img.height * scale);
  } else {
    // fallback: draw colored rect inside polygon
    ctx.fillStyle = "orange";
    ctx.fillRect(-150, -100, 300, 200);
  }

  ctx.restore();

  // Draw polygon outline for reference
  ctx.save();
  ctx.translate(centerX, centerY);
  ctx.beginPath();
  ctx.moveTo(points[0].points.x, points[0].points.y);
  for (let i = 0; i < points.length; i++) {
    const next = (i + 1) % points.length;
    if (points[i].edgeModes) {
      const cp1 = points[i].controls[0];
      const cp2 = points[i].controls[1];
      const pNext = points[next].points;
      ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, pNext.x, pNext.y);
    } else {
      ctx.lineTo(points[next].points.x, points[next].points.y);
    }
  }
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "black";
  ctx.stroke();
  ctx.restore();
}
</script>
</body>
</html>
