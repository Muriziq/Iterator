<!DOCTYPE html>
<html>
<head>
  <title>Canvas Shape Scale</title>
  <style>
    canvas { border: 1px solid black; }
  </style>
</head>
<body>
<canvas id="canvas" width="600" height="400"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let points = [
  { x: 100, y: 100 },
  { x: 250, y: 80 },
  { x: 350, y: 200 },
  { x: 280, y: 300 },
  { x: 150, y: 250 },
];

let isDraggingEdge = false;
let edge = null;
let startX = 0;
let originalBox = {};

function getBoundingBox(pts) {
  const xs = pts.map(p => p.x);
  const ys = pts.map(p => p.y);
  return {
    minX: Math.min(...xs),
    maxX: Math.max(...xs),
    minY: Math.min(...ys),
    maxY: Math.max(...ys),
  };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw shape
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.closePath();
  ctx.strokeStyle = 'blue';
  ctx.stroke();

  // Draw bounding box
  const { minX, maxX, minY, maxY } = getBoundingBox(points);
  ctx.strokeStyle = 'red';
  ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);

  // Draw edges for interaction
  ctx.fillStyle = 'red';
  ctx.fillRect(minX - 3, minY - 3, 6, 6); // Top-left
  ctx.fillRect(maxX - 3, minY - 3, 6, 6); // Top-right
  ctx.fillRect(minX - 3, maxY - 3, 6, 6); // Bottom-left
  ctx.fillRect(maxX - 3, maxY - 3, 6, 6); // Bottom-right
}

function getEdgeHit(x, y) {
  const { minX, maxX, minY, maxY } = getBoundingBox(points);
  const tolerance = 6;

  if (Math.abs(x - maxX) < tolerance && y > minY && y < maxY) return 'right';
  if (Math.abs(x - minX) < tolerance && y > minY && y < maxY) return 'left';
  if (Math.abs(y - maxY) < tolerance && x > minX && x < maxX) return 'bottom';
  if (Math.abs(y - minY) < tolerance && x > minX && x < maxX) return 'top';

  return null;
}

let isMouseDown = false;

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const hit = getEdgeHit(x, y);
  if (hit) {
    isDraggingEdge = true;
    edge = hit;
    startX = x;
    startY = y;
    originalBox = getBoundingBox(points);
    isMouseDown = true;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDraggingEdge || !isMouseDown) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const dx = x - startX;
  const dy = y - startY;

  const { minX, maxX, minY, maxY } = originalBox;
  const width = maxX - minX;
  const height = maxY - minY;

  let scaleX = 1, scaleY = 1;

  if (edge === 'right') {
    scaleX = (width + dx) / width;
  } else if (edge === 'left') {
    scaleX = (width - dx) / width;
  }

  if (edge === 'bottom') {
    scaleY = (height + dy) / height;
  } else if (edge === 'top') {
    scaleY = (height - dy) / height;
  }

  points = points.map(p => ({
    x: (edge === 'left' || edge === 'right') ? (p.x - minX) * scaleX + minX : p.x,
    y: (edge === 'top' || edge === 'bottom') ? (p.y - minY) * scaleY + minY : p.y,
  }));

  draw();
});

canvas.addEventListener('mouseup', () => {
  isMouseDown = false;
  isDraggingEdge = false;
  edge = null;
});


draw();
</script>
</body>
</html>
