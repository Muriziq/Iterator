<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Radial Gradient with 3 Colors</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #eee;
    }
    canvas {
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <canvas id="myCanvas" width="400" height="400"></canvas>
  <script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');

    // Define center and radius for radial gradient
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const innerRadius = 0;
    const outerRadius = 150;

    // Create radial gradient: from inner circle (centerX, centerY, innerRadius)
    // to outer circle (centerX, centerY, outerRadius)
    const grad = ctx.createRadialGradient(centerX, centerY, innerRadius, centerX, centerY, outerRadius);

    // Add 3 color stops
    grad.addColorStop(0, 'red');       // center: red
    grad.addColorStop(0.5, 'yellow');  // middle: yellow
    grad.addColorStop(1, 'blue');      // edge: blue

    // Fill a rectangle with the radial gradient
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
