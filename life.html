<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom & Pan (Top-Left Origin)</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: #eee;
  }

  .container {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    background: #ccc;
  }

  .zoomable {
    width: 800px;
    height: 600px;
    background: linear-gradient(45deg, #09f, #f09);
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0; /* 🟢 top-left corner */
    transform: translate(0, 0) scale(1);
    cursor: grab;
    border: 3px solid #fff;
    transition: transform 0.05s ease-out;
  }
</style>
</head>
<body>

<div class="container">
  <div class="zoomable"></div>
</div>

<script>
const container = document.querySelector('.container');
const zoomable = document.querySelector('.zoomable');

let scale = 1;
let pos = { x: 0, y: 0 };
let start = { x: 0, y: 0 };
let dragging = false;

// 🔧 Unified function to clamp position & apply transform
function applyTransform() {
  const containerRect = container.getBoundingClientRect();
  const baseWidth = 800;
  const baseHeight = 600;
  const scaledWidth = baseWidth * scale;
  const scaledHeight = baseHeight * scale;

  // Compute boundaries (top-left origin)
  const minX = Math.min(0, containerRect.width - scaledWidth);
  const minY = Math.min(0, containerRect.height - scaledHeight);
  const maxX = 0;
  const maxY = 0;

  // Clamp within bounds
  pos.x = Math.min(maxX, Math.max(minX, pos.x));
  pos.y = Math.min(maxY, Math.max(minY, pos.y));

  // Apply transform (no calc needed)
  zoomable.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
}

// 🖱️ Drag to move
zoomable.addEventListener('mousedown', (e) => {
  dragging = true;
  start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
  zoomable.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  pos.x = e.clientX - start.x;
  pos.y = e.clientY - start.y;
  applyTransform();
});

window.addEventListener('mouseup', () => {
  dragging = false;
  zoomable.style.cursor = 'grab';
});

// 🔍 Ctrl + / Ctrl - to zoom
window.addEventListener('keydown', (e) => {
  if (!e.ctrlKey) return; // Only zoom with Ctrl pressed

  const zoomStep = 0.1;
  let newScale = scale;

  if (e.key === '=' || e.key === '+') {
    newScale = Math.min(3, scale + zoomStep);
  } else if (e.key === '-') {
    newScale = Math.max(0.5, scale - zoomStep);
  } else {
    return; // Ignore other keys
  }

  e.preventDefault();

  // Zoom relative to the top-left corner (optional center-based math can be added)
  const rect = container.getBoundingClientRect();
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  // Adjust position so zoom feels centered around container center
  pos.x -= (centerX - pos.x) * (newScale / scale - 1);
  pos.y -= (centerY - pos.y) * (newScale / scale - 1);

  scale = newScale;
  applyTransform();
});
</script>

</body>
</html>
